server {
    listen 80;
    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
    }

    location /admin {
        proxy_pass http://cms:1337;
        proxy_set_header Host $host;
    }

    location /api {
        proxy_pass http://cms:1337;
        proxy_set_header Host $host;
    }
}